<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Intake | ALBS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #16213e;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .success { 
            display: none; 
            text-align: center; 
            padding: 40px; 
        }
        .success h2 { color: #22c55e; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="formCard">
            <h1>Client Intake</h1>
            <p class="subtitle">All Lines Business Solutions</p>
            
            <form id="intakeForm" action="https://formspree.io/f/xpwzgjvr" method="POST">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required>
                
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">
                
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company">
                
                <label for="service">Service Needed *</label>
                <select id="service" name="service" required>
                    <option value="">Select a service...</option>
                    <option value="tax-prep">Tax Preparation</option>
                    <option value="bookkeeping">Bookkeeping</option>
                    <option value="payroll">Payroll Services</option>
                    <option value="business-consulting">Business Consulting</option>
                    <option value="ai-automation">AI Automation</option>
                    <option value="other">Other</option>
                </select>
                
                <label for="message">How can we help?</label>
                <textarea id="message" name="message" rows="4"></textarea>
                
                <label for="file">Attach Documents (PDF, Word, Excel)</label>
                <input type="file" id="file" name="attachment" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png">
                
                <button type="submit">Submit</button>
            </form>
        </div>
        
        <div class="card success" id="successMessage">
            <h2>Thank You!</h2>
            <p>We've received your information and will be in touch within 24 hours.</p>
        </div>
    </div>

    <script>
        document.getElementById('intakeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(this.action, {
                method: 'POST',
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    document.getElementById('formCard').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
